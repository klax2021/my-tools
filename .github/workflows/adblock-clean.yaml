name: Adblock Clean Update (Full + Lite)

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 缓存 mihomo
      - name: Cache mihomo
        id: cache-mihomo
        uses: actions/cache@v4
        with:
          path: ~/.cache/mihomo
          key: mihomo-v1.19.21

      # 下载 mihomo（仅第一次）
      - name: Download mihomo if cache miss
        if: steps.cache-mihomo.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.cache/mihomo
          echo "Downloading mihomo..."
          curl -L --max-time 30 --retry 3 --retry-delay 5 \
            -o ~/.cache/mihomo/mihomo.gz \
            https://github.com/MetaCubeX/mihomo/releases/download/v1.19.21/mihomo-linux-amd64-v1-v1.19.21.gz
          gunzip ~/.cache/mihomo/mihomo.gz
          chmod +x ~/.cache/mihomo/mihomo

      # 正确测试（新版支持 --version）
      - name: Test mihomo
        run: |
          ~/.cache/mihomo/mihomo --version

      # Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 生成 YAML
      - name: 生成干净广告规则集 (YAML)
        run: python adblock-clean/generate.py

      # 转换 YAML → MRS
      - name: 转换 YAML → MRS
        run: |
          ~/.cache/mihomo/mihomo convert-ruleset domain yaml adblock-clean-full.yaml adblock-clean-full.mrs
          ~/.cache/mihomo/mihomo convert-ruleset domain yaml adblock-clean-lite.yaml adblock-clean-lite.mrs

      # 自动提交更新
      - name: Commit & Push 更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add adblock-clean-full.yaml adblock-clean-full.mrs adblock-clean-lite.yaml adblock-clean-lite.mrs
          if git diff --staged --quiet; then
            echo "没有变化，跳过提交"
          else
            git commit -m "chore: 自动更新干净广告规则集 (Full + Lite)"
            git push
          fi
