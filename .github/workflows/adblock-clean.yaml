name: Adblock Clean Update (Full + Lite)

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 缓存 mihomo 内核
      - name: Cache mihomo
        uses: actions/cache@v4
        with:
          path: ~/.cache/mihomo
          key: mihomo-v1.19.21-linux-amd64

      # 下载 mihomo v1（缓存命中则跳过）
      - name: Download mihomo v1
        run: |
          mkdir -p ~/.cache/mihomo
          if [ ! -f ~/.cache/mihomo/mihomo ]; then
            echo "Cache miss, downloading mihomo..."
            curl -L -o ~/.cache/mihomo/mihomo.gz \
              https://github.com/MetaCubeX/mihomo/releases/download/v1.19.21/mihomo-linux-amd64-v1-v1.19.21.gz
            gunzip ~/.cache/mihomo/mihomo.gz
            chmod +x ~/.cache/mihomo/mihomo
          else
            echo "Cache hit, skip download"
          fi

      # 验证版本
      - name: Test mihomo v1
        run: |
          ~/.cache/mihomo/mihomo -v

      # Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 安装 requests 依赖
      - name: Install requests
        run: pip install requests

      # 生成 YAML
      - name: 生成干净广告规则集 (YAML)
        run: python adblock-clean/generate.py

      # 转换 YAML → MRS
      - name: 转换 YAML → MRS
        run: |
          echo "=== 转换 Full ==="
          ~/.cache/mihomo/mihomo convert-ruleset domain yaml adblock-clean-full.yaml adblock-clean-full.mrs

          echo "=== 转换 Lite ==="
          ~/.cache/mihomo/mihomo convert-ruleset domain yaml adblock-clean-lite.yaml adblock-clean-lite.mrs

      # 自动提交更新
      - name: Commit & Push 更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add adblock-clean-full.yaml adblock-clean-full.mrs adblock-clean-lite.yaml adblock-clean-lite.mrs
          if git diff --staged --quiet; then
            echo "没有变化，跳过提交"
          else
            git commit -m "chore: 自动更新干净广告规则集 (Full + Lite)"
            git push
          fi
