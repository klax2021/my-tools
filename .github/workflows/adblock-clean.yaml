name: Adblock Clean Update (Full + Lite)

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 不使用缓存，直接重新下载 v1 内核
      - name: Download mihomo v1 (fresh)
        run: |
          rm -rf ~/.cache/mihomo
          mkdir -p ~/.cache/mihomo
          echo "Downloading mihomo v1..."
          curl -L -o ~/.cache/mihomo/mihomo.gz \
            https://github.com/MetaCubeX/mihomo/releases/download/v1.19.21/mihomo-linux-amd64-v1-v1.19.21.gz
          gunzip ~/.cache/mihomo/mihomo.gz
          chmod +x ~/.cache/mihomo/mihomo

      # 不安装到系统，直接用下载的文件执行（避免系统旧版本干扰）
      - name: Test mihomo v1
        run: |
          ~/.cache/mihomo/mihomo --version

      # Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 生成 YAML
      - name: 生成干净广告规则集 (YAML)
        run: python adblock-clean/generate.py

      # 转换 YAML → MRS（直接用下载的 mihomo）
      - name: 转换 YAML → MRS
        run: |
          echo "=== 转换 Full ==="
          ~/.cache/mihomo/mihomo convert-ruleset domain yaml adblock-clean-full.yaml adblock-clean-full.mrs

          echo "=== 转换 Lite ==="
          ~/.cache/mihomo/mihomo convert-ruleset domain yaml adblock-clean-lite.yaml adblock-clean-lite.mrs

      # 自动提交更新
      - name: Commit & Push 更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add adblock-clean-full.yaml adblock-clean-full.mrs adblock-clean-lite.yaml adblock-clean-lite.mrs
          if git diff --staged --quiet; then
            echo "没有变化，跳过提交"
          else
            git commit -m "chore: 自动更新干净广告规则集 (Full + Lite)"
            git push
          fi
